<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <!--=============== FAVICON ===============-->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <!--=============== CSS  ===============-->
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <!--=============== JS  ===============-->
    <script src="./assets/js/script.js" defer></script>
    <!--=============== TITLE ===============-->
    <title>Frontend Mentor | Contact form</title>
  </head>
  <body>
    <div class="background-img-wrapper">
      <div class="background-img"></div>
    </div>
    <main class="container">
      <h1>Contact Us</h1>
      <form action="#">
        <div class="inputs first-name">
          <label for="first-name"
            >First Name <span aria-hidden="true">*</span></label
          >
          <input
            id="first-name"
            type="text"
            class="first-name-input"
            aria-describedby="first-name-mess"
          />
          <p class="hidden" id="first-name-mess">This field is required</p>
        </div>
        <div class="inputs last-name">
          <label for="last-name"
            >Last Name <span aria-hidden="true">*</span></label
          >
          <input
            id="last-name"
            type="text"
            class="last-name-input"
            aria-describedby="last-name-mess"
          />
          <p class="hidden" id="last-name-mess">This field is required</p>
        </div>
        <div class="inputs email">
          <label for="email"
            >Email Address <span aria-hidden="true">*</span></label
          >
          <input
            id="email"
            type="email"
            class="email-input"
            name="email"
            autocomplete="email"
            inputmode="email"
            required
            aria-describedby="email-mess"
            aria-required="true"
          />
          <p class="hidden" id="email-mess">
            Please enter a valid email address
          </p>
        </div>
        <fieldset class="inputs radio-group">
          <legend>Query Type <span aria-hidden="true">*</span></legend>

          <div class="radio-options-box">
            <div class="radio-option">
              <input
                type="radio"
                id="general-enquiry"
                name="query-type"
                value="general-enquiry"
                required
                aria-describedby="query-type-mess"
              />
              <label for="general-enquiry">General Enquiry</label>
            </div>

            <div class="radio-option">
              <input
                type="radio"
                id="support-request"
                name="query-type"
                value="support-request"
                required
                aria-describedby="query-type-mess"
              />
              <label for="support-request">Support Request</label>
            </div>
          </div>

          <p class="hidden" id="query-type-mess">Please select a query type</p>
        </fieldset>
        <div class="inputs message">
          <label for="message">Message <span aria-hidden="true">*</span></label>
          <textarea
            id="message"
            class="message-input"
            aria-describedby="message-mess"
          ></textarea>
          <p class="hidden" id="message-mess">This field is required</p>
        </div>
        <div class="inputs consent">
          <div class="consent-mess-main">
            <input type="checkbox" id="consent" />
            <label for="consent"
              >I consent to being contacted by the team
              <span aria-hidden="true">*</span></label
            >
          </div>
          <p class="hidden" id="consent-mess">
            To submit this form, please consent to being contacted
          </p>
        </div>
        <button type="submit">Submit</button>
      </form>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/pettik">Petr Bednarski</a>.
    </footer>
  </body>
</html>
